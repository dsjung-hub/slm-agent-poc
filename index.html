<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POC - 민원조회</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <nav class="nav">
    <a href="/slm-agent-poc/request.html">민원 입력</a>
    <a href="/slm-agent-poc/index.html" class="active">민원 조회</a>
  </nav>

  <main class="page">
    <section class="page-header">
      <h1>민원조회 (POC)</h1>
      <p>등록된 민원을 조회하고 상세 내용을 확인합니다.</p>
    </section>

    <section class="box">
      <div class="toolbar">
        <div class="toolbar-item">
          <label for="status">처리상태</label>
          <select id="status">
            <option value="">전체</option>
            <option value="접수">접수</option>
            <option value="처리중">처리중</option>
            <option value="완료">완료</option>
            <option value="보류">보류</option>
          </select>
        </div>
      </div>

      <div class="table-wrap">
        <table class="request-table">
          <thead>
            <tr>
              <th>요구사항 번호</th>
              <th>제목</th>
              <th>민원 유형</th>
              <th>처리상태</th>
              <th>신청자</th>
              <th>요청일자</th>
              <th>요청내용</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr>
              <td colspan="7" class="empty-row">데이터를 불러오는 중입니다.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module" src="./index.js"></script>
</body>
</html>
