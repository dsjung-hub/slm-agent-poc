<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>민원 입력 (POC)</title>

 <style>
  * {
    box-sizing: border-box;
  }

  body {
    font-family: Arial, sans-serif;
    margin: 24px;
    background: #f7f8fa;
    color: #222;
  }

  .nav-buttons {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .nav-btn {
    display: inline-block;
    padding: 14px 28px;
    border-radius: 14px;
    text-decoration: none;
    font-size: 18px;
    font-weight: bold;
    background: #e9eef5;
    color: #26415f;
  }

  .nav-btn.active {
    background: #3b97db;
    color: white;
  }

  h1 {
    margin-bottom: 20px;
    font-size: 28px;
  }

  .form-box {
    background: white;
    padding: 24px;
    border-radius: 16px;
    width: 100%;
    max-width: 720px;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
  }

  label {
    display: block;
    margin-top: 12px;
    margin-bottom: 6px;
    font-weight: bold;
  }

  input,
  select,
  textarea {
    width: 100%;
    padding: 12px;
    font-size: 14px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    background: #fff;
  }

  textarea {
    min-height: 120px;
    resize: vertical;
  }

  .form-actions {
    margin-top: 16px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  button {
    padding: 12px 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
  }

  #submitBtn {
    background: #3b97db;
    color: white;
  }

  #resetBtn {
    background: #ccc;
    color: black;
  }

  #message {
    margin-top: 16px;
    font-weight: bold;
  }

  @media (max-width: 768px) {
    body {
      margin: 16px;
    }

    h1 {
      font-size: 24px;
    }

    .nav-btn {
      width: 100%;
      text-align: center;
      font-size: 16px;
      padding: 12px 16px;
    }

    .form-box {
      padding: 18px;
      border-radius: 12px;
    }

    button {
      width: 100%;
    }
  }
</style>
</head>
<body>

  <div class="nav-buttons">
    <a href="./request.html" class="nav-btn active">민원 입력</a>
    <a href="./index.html" class="nav-btn">민원 조회</a>
  </div>

  <h1>민원 입력 (POC)</h1>

  <div class="form-box">
    <label for="title">민원명</label>
    <input type="text" id="title" placeholder="예: 로그인 오류">

    <label for="requester">요청자</label>
    <input type="text" id="requester" placeholder="예: 홍길동">

    <label for="system_name">시스템명</label>
    <input type="text" id="system_name" placeholder="예: 민원시스템">

    <label for="priority">우선순위</label>
    <select id="priority">
      <option value="상">상</option>
      <option value="중" selected>중</option>
      <option value="하">하</option>
    </select>

    <label for="detail">요청내용</label>
    <textarea id="detail" placeholder="요청 내용을 입력하세요"></textarea>

    <div class="form-actions">
      <button id="submitBtn" type="button">등록</button>
      <button id="resetBtn" type="button">초기화</button>
    </div>

    <div id="message"></div>
  </div>

  <script type="module" src="./request.js"></script>
</body>
</html>
