<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>민원 입력 (POC)</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      background: #f7f8fa;
    }

    .nav-buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .nav-btn {
      display: inline-block;
      padding: 14px 28px;
      border-radius: 14px;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
      background: #e9eef5;
      color: #26415f;
    }

    .nav-btn.active {
      background: #3b97db;
      color: white;
    }

    h1 {
      margin-bottom: 20px;
    }

    .form-box {
      background: white;
      padding: 24px;
      border-radius: 16px;
      width: 520px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 4px;
      font-weight: bold;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .form-actions {
      margin-top: 16px;
    }

    button {
      padding: 10px 16px;
      margin-right: 8px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #submitBtn {
      background: #3b97db;
      color: white;
    }

    #resetBtn {
      background: #ccc;
      color: black;
    }

    #message {
      margin-top: 16px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="nav-buttons">
    <a href="./request.html" class="nav-btn active">민원 입력</a>
    <a href="./index.html" class="nav-btn">민원 조회</a>
  </div>

  <h1>민원 입력 (POC)</h1>

  <div class="form-box">
    <label for="title">민원명</label>
    <input type="text" id="title" placeholder="예: 로그인 오류">

    <label for="requester">요청자</label>
    <input type="text" id="requester" placeholder="예: 홍길동">

    <label for="system_name">시스템명</label>
    <input type="text" id="system_name" placeholder="예: 민원시스템">

    <label for="priority">우선순위</label>
    <select id="priority">
      <option value="상">상</option>
      <option value="중" selected>중</option>
      <option value="하">하</option>
    </select>

    <label for="detail">요청내용</label>
    <textarea id="detail" placeholder="요청 내용을 입력하세요"></textarea>

    <div class="form-actions">
      <button id="submitBtn" type="button">등록</button>
      <button id="resetBtn" type="button">초기화</button>
    </div>

    <div id="message"></div>
  </div>

  <script type="module" src="./request.js"></script>
</body>
</html>
