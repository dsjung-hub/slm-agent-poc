<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POC - 민원 입력</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <nav class="nav">
    <a href="./request.html" class="active">민원 입력</a>
    <a href="./index.html">민원 조회</a>
  </nav>

  <h1>민원 입력 (POC)</h1>

  <div class="form-card">
    <div class="form-row">
      <label for="complaintTitle">민원명</label>
      <input id="complaintTitle" type="text" placeholder="예: 처리상태 검색조건 추가">
    </div>

    <div class="form-row">
      <label for="requester">요청자</label>
      <input id="requester" type="text" placeholder="예: 홍길동">
    </div>

    <div class="form-row">
      <label for="systemName">시스템명</label>
      <input id="systemName" type="text" placeholder="예: 민원조회 시스템">
    </div>

    <div class="form-row">
      <label for="priority">우선순위</label>
      <select id="priority">
        <option value="상">상</option>
        <option value="중" selected>중</option>
        <option value="하">하</option>
      </select>
    </div>

    <div class="form-row">
      <label for="detail">요청내용</label>
      <textarea id="detail" rows="6" placeholder="예: 민원조회 화면에 처리상태 검색조건과 결과 컬럼을 추가해주세요."></textarea>
    </div>

    <div class="form-actions">
      <button id="submitBtn" type="button">등록</button>
      <button id="resetBtn" type="button" class="secondary">초기화</button>
    </div>
  </div>

  <div class="box">
    <h2>최근 등록 내역</h2>
    <table id="requestResult">
      <thead>
        <tr>
          <th>No</th>
          <th>민원명</th>
          <th>요청자</th>
          <th>시스템명</th>
          <th>우선순위</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td colspan="5">불러오는 중...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      query,
      orderBy,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCMAhzThQbNKs6UpzfysbzEji1qHi-CKho",
      authDomain: "pl-agent-poc.firebaseapp.com",
      projectId: "pl-agent-poc",
      storageBucket: "pl-agent-poc.firebasestorage.app",
      messagingSenderId: "1099031062367",
      appId: "1:1099031062367:web:6bf75315ec9d4e941378ea"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    console.log("firebase projectId =", firebaseConfig.projectId);

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function loadRecentComplaints() {
      const tbody = document.querySelector("#requestResult tbody");
      if (!tbody) return;

      tbody.innerHTML = "<tr><td colspan='5'>불러오는 중...</td></tr>";

      try {
        const q = query(collection(db, "complaints"), orderBy("createdAt", "desc"));
        const snapshot = await getDocs(q);

        if (snapshot.empty) {
          tbody.innerHTML = "<tr><td colspan='5'>등록된 민원이 없습니다.</td></tr>";
          return;
        }

        let html = "";
        let no = 1;

        snapshot.forEach((doc) => {
          const item = doc.data();
          html += `
            <tr>
              <td>${no++}</td>
              <td>${escapeHtml(item.title)}</td>
              <td>${escapeHtml(item.requester)}</td>
              <td>${escapeHtml(item.system)}</td>
              <td>${escapeHtml(item.priority)}</td>
            </tr>
          `;
        });

        tbody.innerHTML = html;
      } catch (error) {
        console.error("최근 등록 내역 조회 오류:", error);
        tbody.innerHTML = "<tr><td colspan='5'>조회 중 오류가 발생했습니다.</td></tr>";
      }
    }

    async function submitComplaint() {
      const submitBtn = document.getElementById("submitBtn");

      const complaintTitle = document.getElementById("complaintTitle")?.value.trim();
      const requester = document.getElementById("requester")?.value.trim();
      const systemName = document.getElementById("systemName")?.value.trim();
      const priority = document.getElementById("priority")?.value;
      const detail = document.getElementById("detail")?.value.trim();

      if (!complaintTitle || !requester || !systemName || !priority || !detail) {
        alert("모든 항목을 입력하세요.");
        return;
      }

      try {
        submitBtn.disabled = true;
        submitBtn.textContent = "등록 중...";

        console.log("저장 시작");

        const docRef = await addDoc(collection(db, "complaints"), {
          title: complaintTitle,
          requester: requester,
          system: systemName,
          priority: priority,
          content: detail,
          status: "접수",
          createdAt: serverTimestamp()
        });

        console.log("저장 성공:", docRef.id);

        alert("민원이 Firebase에 저장되었습니다.");
        resetComplaintForm();
        await loadRecentComplaints();
      } catch (error) {
        console.error("민원 저장 오류:", error);
        alert("저장 중 오류가 발생했습니다. F12 → Console을 확인하세요.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "등록";
      }
    }

    function resetComplaintForm() {
      document.getElementById("complaintTitle").value = "";
      document.getElementById("requester").value = "";
      document.getElementById("systemName").value = "";
      document.getElementById("priority").value = "중";
      document.getElementById("detail").value = "";
    }

    window.addEventListener("DOMContentLoaded", async () => {
      document.getElementById("submitBtn")?.addEventListener("click", submitComplaint);
      document.getElementById("resetBtn")?.addEventListener("click", resetComplaintForm);
      await loadRecentComplaints();
    });
  </script>
</body>
</html>
