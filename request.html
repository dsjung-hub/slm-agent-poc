<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>민원 입력 (POC)</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      background: #f7f8fa;
    }

    .nav-buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .nav-btn {
      display: inline-block;
      padding: 14px 28px;
      border-radius: 14px;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
      background: #e9eef5;
      color: #26415f;
    }

    .nav-btn.active {
      background: #3b97db;
      color: white;
    }

    h1 {
      margin-bottom: 20px;
    }

    .form-box {
      background: white;
      padding: 24px;
      border-radius: 16px;
      width: 420px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 4px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .form-actions {
      margin-top: 16px;
    }

    button {
      padding: 10px 16px;
      margin-right: 8px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #submitBtn {
      background: #3b97db;
      color: white;
    }

    #resetBtn {
      background: #ccc;
      color: black;
    }
  </style>
</head>
<body>

  <!-- 상단 버튼 -->
  <div class="nav-buttons">
    <a href="./request.html" class="nav-btn active">민원 입력</a>
    <a href="./index.html" class="nav-btn">민원 조회</a>
  </div>

  <h1>민원 입력 (POC)</h1>

  <!-- 입력폼 -->
  <div class="form-box">

    <label>요구사항 번호</label>
    <input type="text" id="reqNo" placeholder="예: 1">

    <label>민원명</label>
    <input type="text" id="title" placeholder="예: 로그인 오류">

    <label>처리상태</label>
    <select id="status">
      <option value="접수">접수</option>
      <option value="처리중">처리중</option>
      <option value="완료">완료</option>
      <option value="반려">반려</option>
    </select>

    <div class="form-actions">
      <button id="submitBtn" type="button">등록</button>
      <button id="resetBtn" type="button" class="secondary">초기화</button>
    </div>

  </div>

  <!-- JS 연결 -->
  <script type="module" src="./request.js"></script>

</body>
</html>
