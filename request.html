<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POC - 민원입력</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <nav class="nav">
    <a href="/slm-agent-poc/request.html" class="active">민원 입력</a>
    <a href="/slm-agent-poc/index.html">민원 조회</a>
  </nav>

  <main class="page">
    <section class="page-header">
      <h1>민원입력 (POC)</h1>
      <p>민원 정보를 입력하고 등록합니다.</p>
    </section>

    <section class="box form-box">
      <form id="requestForm" class="request-form">
        <div class="form-grid">
          <div class="form-group">
            <label for="reqNo">요구사항 번호</label>
            <input type="text" id="reqNo" placeholder="예: RQ-2026-001" />
          </div>

          <div class="form-group">
            <label for="title">제목</label>
            <input type="text" id="title" placeholder="민원 제목 입력" />
          </div>

          <div class="form-group">
            <label for="category">민원 유형</label>
            <select id="category">
              <option value="">선택</option>
              <option value="시스템">시스템</option>
              <option value="서비스">서비스</option>
              <option value="계정">계정</option>
              <option value="장애">장애</option>
              <option value="기타">기타</option>
            </select>
          </div>

          <div class="form-group">
            <label for="status">처리상태</label>
            <select id="status">
              <option value="접수">접수</option>
              <option value="처리중">처리중</option>
              <option value="완료">완료</option>
              <option value="보류">보류</option>
            </select>
          </div>

          <div class="form-group">
            <label for="requester">신청자</label>
            <input type="text" id="requester" placeholder="신청자명 입력" />
          </div>

          <div class="form-group">
            <label for="phone">연락처</label>
            <input type="text" id="phone" placeholder="예: 010-1234-5678" />
          </div>

          <div class="form-group">
            <label for="email">이메일</label>
            <input type="email" id="email" placeholder="example@email.com" />
          </div>

          <div class="form-group">
            <label for="date">요청일자</label>
            <input type="date" id="date" />
          </div>

          <div class="form-group full-width">
            <label for="content">요청내용</label>
            <textarea
              id="content"
              rows="8"
              placeholder="요청 상세 내용을 입력하세요."
            ></textarea>
          </div>

          <div class="form-group full-width">
            <label for="memo">비고</label>
            <textarea
              id="memo"
              rows="4"
              placeholder="추가 메모가 있으면 입력하세요."
            ></textarea>
          </div>
        </div>

        <div class="form-actions">
          <button id="submitBtn" type="button">등록</button>
          <button id="resetBtn" type="button" class="secondary">초기화</button>
        </div>
      </form>
    </section>
  </main>

  <script type="module" src="./request.js"></script>
</body>
</html>
